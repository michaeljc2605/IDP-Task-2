<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Your Cart — eBookshop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/footer.css">
  </head>
  <body class="bg-gray-50 min-h-screen flex flex-col">
    <div class="site-navbar"></div>

    <main class="flex-grow max-w-5xl mx-auto w-full px-6 py-12">
      <div class="flex items-center justify-between mb-8">
        <div>
          <h1 class="text-3xl font-bold text-gray-800">🛒 Your Cart</h1>
          <p class="text-gray-500 text-sm mt-1">Review your books and place your order</p>
        </div>
        <a href="/" class="text-sm text-gray-400 hover:text-[#134E4A] transition">← Continue Shopping</a>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- Cart Items -->
        <div class="lg:col-span-2">
          <div class="bg-white rounded-2xl shadow-md overflow-hidden">
            <div id="cart-items">
              <div class="px-6 py-8 text-center text-gray-400">Loading cart...</div>
            </div>
          </div>
        </div>

        <!-- Order Form + Summary -->
        <div class="lg:col-span-1">
          <div class="bg-white rounded-2xl shadow-md p-6">
            <h2 class="text-lg font-bold text-gray-800 mb-4">Your Details</h2>

            <div class="space-y-4 mb-6">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Customer Name</label>
                <input id="cust-name" type="text" placeholder="John Doe"
                  class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#134E4A]" />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input id="cust-email" type="email" placeholder="john@email.com"
                  class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#134E4A]" />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
                <input id="cust-phone" type="tel" placeholder="12345678"
                  class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#134E4A]" />
              </div>
            </div>

            <div class="border-t pt-4 mb-4">
              <div class="flex justify-between text-gray-600 text-sm mb-1">
                <span>Subtotal</span>
                <span id="subtotal">$0.00</span>
              </div>
              <div class="flex justify-between text-gray-600 text-sm mb-3">
                <span>Shipping</span>
                <span class="text-[#134E4A] font-medium">Free</span>
              </div>
              <div class="flex justify-between text-gray-800 font-bold text-lg">
                <span>Total</span>
                <span id="total">$0.00</span>
              </div>
            </div>

            <!-- Place Order button: #134E4A bg, #F8FAFC text, hover #E5E7EB text + darker bg -->
            <button onclick="placeOrder()"
              class="w-full py-3 rounded-xl font-semibold transition"
              style="background-color:#134E4A; color:#F8FAFC;"
              onmouseover="this.style.backgroundColor='#0f3d39'; this.style.color='#E5E7EB';"
              onmouseout="this.style.backgroundColor='#134E4A'; this.style.color='#F8FAFC';">
              Place Order
            </button>

            <!-- Clear Cart button: teal outline instead of red -->
            <button onclick="clearCart()"
              class="mt-3 w-full py-2 rounded-xl text-sm transition"
              style="border: 1px solid #134E4A; color:#134E4A; background:transparent;"
              onmouseover="this.style.backgroundColor='rgba(19,78,74,0.08)';"
              onmouseout="this.style.backgroundColor='transparent';">
              Clear Cart
            </button>

            <div id="order-msg" class="mt-4 text-sm text-center hidden"></div>
          </div>
        </div>

      </div>
    </main>

    <div class="site-footer"></div>
    <script src="/js/navbar-v2.js"></script>
    <script src="/js/footer-v2.js"></script>
    <script>
      function getCart() {
        return JSON.parse(localStorage.getItem('cart') || '[]');
      }

      function saveCart(cart) {
        localStorage.setItem('cart', JSON.stringify(cart));
      }

      function clearCart() {
        localStorage.removeItem('cart');
        renderCart();
      }

      function removeFromCart(bookId) {
        const cart = getCart().filter(item => item.id !== bookId);
        saveCart(cart);
        renderCart();
      }

      function updateQuantity(bookId, delta) {
        const cart = getCart();
        const item = cart.find(i => i.id === bookId);
        if (item) {
          item.quantity += delta;
          if (item.quantity <= 0) {
            removeFromCart(bookId);
            return;
          }
        }
        saveCart(cart);
        renderCart();
      }

      function renderCart() {
        const cartItems = document.getElementById('cart-items');
        const cart = getCart();

        if (cart.length === 0) {
          cartItems.innerHTML = `
            <div class="px-6 py-16 text-center">
              <div class="text-6xl mb-4">🛒</div>
              <h3 class="text-xl font-semibold text-gray-700 mb-2">Your cart is empty</h3>
              <p class="text-gray-400 mb-6">Add some books from the store.</p>
              <a href="/" class="text-white px-6 py-2 rounded-lg transition"
                style="background-color:#134E4A;"
                onmouseover="this.style.backgroundColor='#0f3d39';"
                onmouseout="this.style.backgroundColor='#134E4A';">Browse Books</a>
            </div>`;
          document.getElementById('subtotal').textContent = '$0.00';
          document.getElementById('total').textContent = '$0.00';
          return;
        }

        cartItems.innerHTML = `
          <table class="w-full text-sm">
            <thead class="bg-gray-50 text-gray-500 uppercase text-xs tracking-wide">
              <tr>
                <th class="px-4 py-3 text-left">Book</th>
                <th class="px-4 py-3 text-center">Qty</th>
                <th class="px-4 py-3 text-right">Price</th>
                <th class="px-4 py-3"></th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
              ${cart.map(item => `
                <tr class="hover:bg-gray-50 transition">
                  <td class="px-4 py-3">
                    <div class="flex items-center gap-3">
                      <img src="/static/bookpage/${item.id}.jpg"
                           class="w-10 h-14 object-contain rounded"
                           onerror="this.style.display='none'">
                      <div>
                        <div class="font-semibold text-gray-800 text-xs">${item.title}</div>
                        <div class="text-gray-400 text-xs">${item.author}</div>
                      </div>
                    </div>
                  </td>
                  <td class="px-4 py-3">
                    <div class="flex items-center justify-center gap-1">
                      <button onclick="updateQuantity(${item.id}, -1)" class="w-6 h-6 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold text-xs">−</button>
                      <span class="w-5 text-center text-xs font-medium">${item.quantity}</span>
                      <button onclick="updateQuantity(${item.id}, 1)" class="w-6 h-6 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold text-xs">+</button>
                    </div>
                  </td>
                  <td class="px-4 py-3 text-right text-gray-700 font-medium">$${(item.price * item.quantity).toFixed(2)}</td>
                  <td class="px-4 py-3 text-right">
                    <button onclick="removeFromCart(${item.id})" class="text-red-400 hover:text-red-600 text-lg">✕</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>`;

        const subtotal = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
        document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
        document.getElementById('total').textContent = `$${subtotal.toFixed(2)}`;
      }

      async function placeOrder() {
        const name  = document.getElementById('cust-name').value.trim();
        const email = document.getElementById('cust-email').value.trim();
        const phone = document.getElementById('cust-phone').value.trim();
        const cart  = getCart();
        const msg   = document.getElementById('order-msg');

        if (!name || !email || !phone) {
            msg.textContent = '⚠️ Please fill in all your details.';
            msg.className = 'mt-4 text-sm text-center text-red-500';
            msg.classList.remove('hidden');
            return;
        }

        if (cart.length === 0) {
            msg.textContent = '⚠️ Your cart is empty.';
            msg.className = 'mt-4 text-sm text-center text-red-500';
            msg.classList.remove('hidden');
            return;
        }

        try {
            for (const item of cart) {
                const body = new URLSearchParams({
                    cust_name:   name,
                    cust_email:  email,
                    cust_phone:  phone,
                    qty_ordered: item.quantity,
                    book_id:     item.id,
                    book_title:  item.title,
                    total_price: (item.price * item.quantity).toFixed(2)
                });

                await fetch('/api/orders/place', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body
                });
            }

            clearCart();
            msg.textContent = '✅ Order placed successfully! Thank you, ' + name + '!';
            msg.className = 'mt-4 text-sm text-center';
            msg.style.color = '#134E4A';
            msg.classList.remove('hidden');

        } catch (e) {
            msg.textContent = '❌ Error: ' + e.message;
            msg.className = 'mt-4 text-sm text-center text-red-500';
            msg.classList.remove('hidden');
        }
    }

      renderCart();
    </script>
  </body>
</html>
