<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eBookshop - Your Digital Library</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="icon" type="image/png" href="../static/Logo.png">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/footer.css">
</head>
<body>
    <div class="site-navbar"></div>

    <!-- Hero Section -->
    <section class="hero">
        <!-- Video Background -->
        <video class="hero-video" autoplay muted loop playsinline>
            <source src="/static/bannervideo.mp4" type="video/mp4">
        </video>
        <div class="hero-overlay"></div>

        <div class="hero-content">
            <!-- Left: Text -->
            <div class="hero-text-block">
                <h1 class="hero-title fade-in">Discover Your Next Great Read</h1>
                <p class="hero-subtitle fade-in">Browse our curated collection of timeless classics and modern masterpieces</p>
                <div class="hero-actions fade-in">
                    <a href="#books" class="btn btn-primary">Explore Books</a>
                    <a href="querybook.html" class="btn btn-outline">Search by Author</a>
                </div>
            </div>

            <!-- Right: Stats -->
            <div class="hero-stats">
                <div class="stat-card">
                    <h3 id="total-books">0</h3>
                    <p>Books Available</p>
                </div>
                <div class="stat-card">
                    <h3 id="total-authors">0</h3>
                    <p>Authors</p>
                </div>
                <div class="stat-card">
                    <h3 id="total-stock">0</h3>
                    <p>In Stock</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Filter + Books Layout -->
        <section id="books" class="section">
        <div class="container">
            <div class="books-layout">

            <!-- Left: Filter Sidebar -->
            <aside class="filter-sidebar">
                <div class="filter-bar">
                <div class="filter-group">
                    <label for="sort-select" class="form-label">Sort by:</label>
                    <select id="sort-select" class="form-select">
                    <option value="title-asc">Title (A-Z)</option>
                    <option value="title-desc">Title (Z-A)</option>
                    <option value="price-asc">Price (Low to High)</option>
                    <option value="price-desc">Price (High to Low)</option>
                    <option value="author-asc">Author (A-Z)</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="author-filter" class="form-label">Filter by Author:</label>
                    <select id="author-filter" class="form-select">
                    <option value="all">All Authors</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="stock-filter" class="form-label">Availability:</label>
                    <select id="stock-filter" class="form-select">
                    <option value="all">All Books</option>
                    <option value="in-stock">In Stock Only</option>
                    <option value="low-stock">Low Stock</option>
                    </select>
                </div>
                </div>
            </aside>

            <!-- Right: Books Grid -->
            <div class="books-main">
                <div id="books-grid" class="grid grid-3">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading books...</p>
                </div>
                </div>
                <div id="no-results" class="no-results" style="display: none;">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <h3>No books found</h3>
                <p>Try adjusting your filters</p>
                </div>
            </div>

            </div>
        </div>
        </section>

    <script src="js/index.js"></script>
    <script src="js/navbar-v2.js"></script>
    <div class="site-footer"></div>
    <script src="js/footer-v2.js"></script>
</body>
</html>
