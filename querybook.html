<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Books - eBookshop</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/querybook.css">
</head>
<body>
    <div class="search-container">
        <div class="search-card">
            <div class="search-header">
                <div class="search-icon">🔍</div>
                <h1>Search Books by Author</h1>
                <p>Select one or more authors to find their books</p>
            </div>

            <form method="get" action="query" class="search-form" id="searchForm">
                <div class="form-section">
                    <div class="form-section-title">📚 Choose Authors</div>
                    <div class="selection-count" id="selectionCount">
                        No authors selected
                    </div>
                    <div class="author-grid">
                        <div class="checkbox-option">
                            <input type="checkbox" name="author" value="Charles Dickens" id="author1">
                            <label for="author1" class="checkbox-label">
                                <span class="author-name">Charles Dickens</span>
                            </label>
                        </div>
                        <div class="checkbox-option">
                            <input type="checkbox" name="author" value="F. Scott Fitzgerald" id="author2">
                            <label for="author2" class="checkbox-label">
                                <span class="author-name">F. Scott Fitzgerald</span>
                            </label>
                        </div>
                        <div class="checkbox-option">
                            <input type="checkbox" name="author" value="Harper Lee" id="author3">
                            <label for="author3" class="checkbox-label">
                                <span class="author-name">Harper Lee</span>
                            </label>
                        </div>
                        <div class="checkbox-option">
                            <input type="checkbox" name="author" value="George Orwell" id="author4">
                            <label for="author4" class="checkbox-label">
                                <span class="author-name">George Orwell</span>
                            </label>
                        </div>
                        <div class="checkbox-option">
                            <input type="checkbox" name="author" value="Jane Austen" id="author5">
                            <label for="author5" class="checkbox-label">
                                <span class="author-name">Jane Austen</span>
                            </label>
                        </div>
                        <div class="checkbox-option">
                            <input type="checkbox" name="author" value="J.D. Salinger" id="author6">
                            <label for="author6" class="checkbox-label">
                                <span class="author-name">J.D. Salinger</span>
                            </label>
                        </div>
                        <div class="checkbox-option">
                            <input type="checkbox" name="author" value="Herman Melville" id="author7">
                            <label for="author7" class="checkbox-label">
                                <span class="author-name">Herman Melville</span>
                            </label>
                        </div>
                        <div class="checkbox-option">
                            <input type="checkbox" name="author" value="Leo Tolstoy" id="author8">
                            <label for="author8" class="checkbox-label">
                                <span class="author-name">Leo Tolstoy</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="search-actions">
                    <button type="submit" class="btn-search">🔍 Search Books</button>
                    <button type="button" class="btn-reset" id="resetBtn">↺ Clear All</button>
                </div>
            </form>

            <!-- Results will be injected here -->
            <div id="results" class="search-results" aria-live="polite"></div>

            <div class="back-link">
                <a href="/">
                    <span>←</span>
                    <span>Back to Home</span>
                </a>
            </div>
        </div>
    </div>

    <script src="js/querybook.js"></script>
</body>
</html>
