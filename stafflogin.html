<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Staff Login — eBookshop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/footer.css">
  </head>
  <body class="bg-gray-50 min-h-screen flex flex-col">
    <div class="site-navbar"></div>

    <main class="flex-grow flex items-center justify-center py-12 px-4">
      <div class="max-w-md w-full bg-white rounded-lg shadow-md p-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Staff Login</h2>
        <form id="staffLoginForm" action="/staff/login" method="post" class="space-y-4">
          <div>
            <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
            <input id="username" name="username" type="text" required
              class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none"
              style="--tw-ring-color: #134E4A;"
              onfocus="this.style.borderColor='#134E4A'; this.style.boxShadow='0 0 0 2px rgba(19,78,74,0.2)';"
              onblur="this.style.borderColor=''; this.style.boxShadow='';" />
          </div>
          <div>
            <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
            <input id="password" name="password" type="password" required
              class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none"
              onfocus="this.style.borderColor='#134E4A'; this.style.boxShadow='0 0 0 2px rgba(19,78,74,0.2)';"
              onblur="this.style.borderColor=''; this.style.boxShadow='';" />
          </div>
          <div>
            <button type="submit"
              class="w-full py-2 rounded-md font-medium transition"
              style="background-color:#134E4A; color:#F8FAFC;"
              onmouseover="this.style.backgroundColor='#0f3d39'; this.style.color='#E5E7EB';"
              onmouseout="this.style.backgroundColor='#134E4A'; this.style.color='#F8FAFC';">
              Sign in
            </button>
          </div>
        </form>
      </div>
    </main>

    <div class="site-footer"></div>
    <script src="/js/navbar-v2.js"></script>
    <script src="/js/footer-v2.js"></script>
    <script>
      document.getElementById('staffLoginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const formData = new FormData(this);

        const resp = await fetch('/staff/login', {
          method: 'POST',
          body: new URLSearchParams(formData)
        });

        if (resp.ok) {
          window.location.href = '/staff/index.html';
        } else {
          const msg = await resp.text();
          alert('Login failed: ' + msg);
        }
      });
    </script>
  </body>
</html>
